{% load static %}
<link rel="stylesheet" href="{% static 'CSS/Componentes/sidebar.css' %}">

    <div class="sidebar-marca">

    <nav class="sidebar-nav">

        <a href="/dashboard/" class="item-nav activo" data-modulo="dashboard">
            <i class="bi bi-grid-1x2"></i>

        <a href="/temperatura/" class="item-nav" data-modulo="temperatura">
            <i class="bi bi-thermometer-half"></i>
            <span>Temperatura</span>

        <a href="/humedad/" class="item-nav" data-modulo="humedad">
            <i class="bi bi-droplet-half"></i>
            <span>Humedad</span>
        </a>

        <a href="/estadisticas/" class="item-nav" data-modulo="estadisticas">

        </a>
        <a href="/historial/" class="item-nav" data-modulo="historial">
            <i class="bi bi-clock-history"></i>

        </a>
        <a href="/desarrolladores/" class="item-nav" data-modulo="desarrolladores">
            <i class="bi bi-people"></i>
            <span>Desarrolladores</span>
        </a>

    <div class="pie-sidebar">
        <form method="POST" action="{% url 'logout' %}" style="width:100%;">
            {% csrf_token %}
            <button type="submit" class="boton-salir">
                <i class="bi bi-box-arrow-left"></i>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </div>
